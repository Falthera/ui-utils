name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - gradle.properties
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read mod version
        run: |
          MOD_VERSION="$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')"
          if [ -z "$MOD_VERSION" ]; then
            echo "Failed to read mod_version from gradle.properties"
            exit 1
          fi
          echo "MOD_VERSION=$MOD_VERSION" >> "$GITHUB_ENV"

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Resolve release jar
        run: |
          JAR_PATH="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
          if [ -z "$JAR_PATH" ]; then
            echo "No release jar found in build/libs"
            exit 1
          fi
          echo "JAR_PATH=$JAR_PATH" >> "$GITHUB_ENV"

      - name: Create release and upload jar
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.MOD_VERSION }}
          name: UI Utils v${{ env.MOD_VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ env.JAR_PATH }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
